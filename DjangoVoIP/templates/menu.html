{% extends 'base.html' %}

{% block header_menu %}
<div class="header-menu-wrapper">
    <button id="menu-button" class="menu-button">☰  Меню</button>
    <div id="menu-dropdown" class="menu-dropdown">
        <div class="menu-dropdown-section">
            <div class="menu-dropdown-title">➕ Створити кімнату</div>
            <form id="create-room-form-dropdown">
                <div class="menu-dropdown-item">
                    <input type="text" id="new-room-name-dropdown" placeholder="Назва кімнати" required>
                    <label class="menu-dropdown-label">
                        <input type="checkbox" id="is-private-checkbox-dropdown">
                        Приватна кімната
                    </label>
                    <input type="password" id="room-password-input-dropdown" placeholder="Пароль" style="display: none;">
                </div>
                <button type="submit" class="menu-dropdown-btn menu-dropdown-btn-primary" style="width: 100%;">Створити та увійти</button>
            </form>
        </div>

        <div class="menu-dropdown-section">
            <div class="menu-dropdown-title">🔓 Приєднатися</div>
            <div class="menu-dropdown-item">
                <label style="color: #b9bbbe; font-size: 11px;">За UUID та паролем:</label>
                <input type="text" id="room-id-input-dropdown" placeholder="UUID кімнати">
                <input type="password" id="join-password-input-dropdown" placeholder="Пароль">
                <button type="button" onclick="joinPrivateRoomByUUID_dropdown()" class="menu-dropdown-btn menu-dropdown-btn-primary" style="width: 100%;">Увійти</button>
            </div>
            <div class="menu-dropdown-item">
                <label style="color: #b9bbbe; font-size: 11px;">За посиланням:</label>
                <input type="text" id="invite-link-input-dropdown" placeholder="Посилання (token UUID)">
                <button type="button" onclick="joinWithInviteLink_dropdown()" class="menu-dropdown-btn menu-dropdown-btn-success" style="width: 100%;">Приєднатися</button>
            </div>
        </div>
    </div>
</div>
<div id="menu-overlay" class="menu-overlay"></div>
{% endblock %}

{% block content %}
<div class="menu-container">
    <div class="section">
        <div style="display: flex; gap: 10px; align-items: center;">
            <input type="text" id="search-input" class="form-input" placeholder="🔍 Пошук кімнат за назвою..." style="flex: 1; padding: 12px 15px; margin: 0;">
            <button id="clear-search-btn" class="btn-secondary" style="display: none; white-space: nowrap; padding: 10px 16px;">✕ Очистити</button>
        </div>
    </div>

    <div class="section">
        <h2>🔒 Мої приватні кімнати</h2>
        <div id="private-rooms" class="room-list"></div>
        <div id="private-loading" style="display: none; text-align: center; padding: 20px;">Завантаження...</div>
        <button id="private-load-more" class="btn-secondary" style="display: none; margin: 15px auto 0 auto;">Показати більше</button>
    </div>

    <div class="section">
        <h2>🌐 Публічні кімнати</h2>
        <div id="public-rooms" class="room-list"></div>
        <div id="public-loading" style="display: none; text-align: center; padding: 20px;">Завантаження...</div>
        <button id="public-load-more" class="btn-secondary" style="display: none; margin: 15px auto 0 auto;">Показати більше</button>
    </div>
</div>

<div id="password-modal" class="modal">
    <div class="modal-content">
        <h3>Введіть пароль для кімнати</h3>
        <p id="modal-room-name" style="margin-bottom: 12px; font-size: 14px; color: #b9bbbe;"></p>
        <input type="password" id="modal-password-input" placeholder="Пароль">
        <div class="modal-buttons">
            <button onclick="closePasswordModal()" class="secondary">Скасувати</button>
            <button onclick="joinPrivateRoom()">Увійти</button>
        </div>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', async function () {
        console.log('=== MENU SCRIPT LOADED ===');

        const urlParams = new URLSearchParams(window.location.search);
        const inviteToken = urlParams.get('invite');
        const roomIdFromUrl = urlParams.get('room');

        if (inviteToken && roomIdFromUrl) {
            console.log('Виявлено інвайт-посилання. Спроба автоприєднання до кімнати:', roomIdFromUrl);

            try {
                const response = await fetch(`/api/rooms/${roomIdFromUrl}/join-with-link/`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRFToken': getCookie('csrftoken') 
                    },
                    body: JSON.stringify({ token: inviteToken }) 
                });

                if (response.ok) {
                    const data = await response.json();
                    // Якщо успішно приєдналися або вже є членом — редіректимо в кімнату
                    window.location.href = `/room/${roomIdFromUrl}/`;
                } else {
                    const data = await response.json();
                    alert('Помилка приєднання за посиланням: ' + (data.detail || 'Недійсне посилання'));
                }
            } catch (error) {
                console.error('Помилка запиту автоприєднання:', error);
                alert('Не вдалося автоматично приєднатися до кімнати.');
            }
        }

        let currentRoomId = null;
        let currentPublicPage = 1;
        let currentPrivatePage = 1;
        let hasMorePublic = true;
        let hasMorePrivate = true;


        function getCookie(name) {
            let cookieValue = null;
            if (document.cookie && document.cookie !== '') {
                const cookies = document.cookie.split(';');
                for (let i = 0; i < cookies.length; i++) {
                    const cookie = cookies[i].trim();
                    if (cookie.substring(0, name.length + 1) === (name + '=')) {
                        cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                        break;
                    }
                }
            }
            return cookieValue;
        }
        window.getCookie = getCookie;

        function createRoomCard(room) {
            const roomCard = document.createElement('div');
            roomCard.className = 'room-card' + (room.is_private ? ' private' : '');

            if (room.is_private) {
                roomCard.innerHTML = `
                <div class="room-card-header">
                    <span class="room-card-name">🔒 ${room.name}</span>
                    <span class="room-badge private">Приватна</span>
                </div>
                <a href="/room/${room.id}/">Увійти →</a>
            `;
            } else {
                roomCard.innerHTML = `
                <div class="room-card-header">
                    <span class="room-card-name">🌐 ${room.name}</span>
                    <span class="room-badge">Публічна</span>
                </div>
                <a href="/room/${room.id}/">Увійти →</a>
            `;
            }
            return roomCard;
        }

        async function loadRooms(page = 1, type = 'all') {
            try {
                let url = `/api/rooms/?page=${page}&page_size=10`;

                const searchQuery = document.getElementById('search-input')?.value.trim();
                if (searchQuery) {
                    url += `&search=${encodeURIComponent(searchQuery)}`;
                }

                if (type === 'public') {
                    url += '&is_private=false';
                } else if (type === 'private') {
                    url += '&is_private=true';
                }

                console.log('Loading rooms:', url);
                const response = await fetch(url);
                const data = await response.json();
                const rooms = data.results || [];
                const pageInfo = {
                    hasMore: data.next || false,
                    nextPage: page + 1,
                    count: data.count || 0,
                    numPages: data.num_pages || 1
                };

                const publicRoomsDiv = document.getElementById('public-rooms');
                const privateRoomsDiv = document.getElementById('private-rooms');
                const publicLoadMoreBtn = document.getElementById('public-load-more');
                const privateLoadMoreBtn = document.getElementById('private-load-more');

                if (page === 1) {
                    if (type === 'public' || type === 'all') {
                        publicRoomsDiv.innerHTML = '';
                    }
                    if (type === 'private' || type === 'all') {
                        privateRoomsDiv.innerHTML = '';
                    }
                }

                rooms.forEach(room => {
                    const roomCard = createRoomCard(room);
                    if (room.is_private) {
                        privateRoomsDiv.appendChild(roomCard);
                    } else {
                        publicRoomsDiv.appendChild(roomCard);
                    }
                });

                if ((type === 'public' || type === 'all') && publicRoomsDiv.children.length === 0 && page === 1) {
                    publicRoomsDiv.innerHTML = '<div class="empty-state"><div class="empty-state-icon">🔕</div><p>Немає публічних кімнат</p></div>';
                }

                if ((type === 'private' || type === 'all') && privateRoomsDiv.children.length === 0 && page === 1) {
                    privateRoomsDiv.innerHTML = '<div class="empty-state"><div class="empty-state-icon">🚫</div><p>Ви не є членом жодної приватної кімнати</p></div>';
                }

                if (type === 'public' || type === 'all') {
                    publicLoadMoreBtn.style.display = pageInfo.hasMore ? 'block' : 'none';
                }

                if (type === 'private' || type === 'all') {
                    privateLoadMoreBtn.style.display = pageInfo.hasMore ? 'block' : 'none';
                }

                return pageInfo;
            } catch (error) {
                console.error('Помилка завантаження кімнат:', error);
                return { hasMore: false };
            }
        }

        // SEARCH handlers
        const searchInput = document.getElementById('search-input');
        const clearSearchBtn = document.getElementById('clear-search-btn');
        let searchTimeout;

        if (searchInput) {
            searchInput.addEventListener('input', function () {
                if (this.value.trim()) {
                    clearSearchBtn.style.display = 'block';
                } else {
                    clearSearchBtn.style.display = 'none';
                }

                clearTimeout(searchTimeout);
                searchTimeout = setTimeout(() => {
                    currentPublicPage = 1;
                    currentPrivatePage = 1;
                    loadRooms(1, 'public');
                    loadRooms(1, 'private');
                }, 300);
            });

            searchInput.addEventListener('keypress', function (e) {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    clearTimeout(searchTimeout);
                    currentPublicPage = 1;
                    currentPrivatePage = 1;
                    loadRooms(1, 'public');
                    loadRooms(1, 'private');
                }
            });
        }

        if (clearSearchBtn) {
            clearSearchBtn.addEventListener('click', function () {
                searchInput.value = '';
                searchInput.focus();
                this.style.display = 'none';
                currentPublicPage = 1;
                currentPrivatePage = 1;
                loadRooms(1, 'public');
                loadRooms(1, 'private');
            });
        }

        // Initial load
        const initialPublicPageInfo = await loadRooms(1, 'public');
        const initialPrivatePageInfo = await loadRooms(1, 'private');

        hasMorePublic = initialPublicPageInfo?.hasMore || false;
        hasMorePrivate = initialPrivatePageInfo?.hasMore || false;

        // Load more buttons
        document.getElementById('public-load-more')?.addEventListener('click', async function () {
            if (!hasMorePublic) return;

            document.getElementById('public-loading').style.display = 'block';
            this.style.display = 'none';

            currentPublicPage++;
            const pageInfo = await loadRooms(currentPublicPage, 'public');
            hasMorePublic = pageInfo.hasMore;

            document.getElementById('public-loading').style.display = 'none';
            if (hasMorePublic) {
                this.style.display = 'block';
            }
        });

        document.getElementById('private-load-more')?.addEventListener('click', async function () {
            if (!hasMorePrivate) return;

            document.getElementById('private-loading').style.display = 'block';
            this.style.display = 'none';

            currentPrivatePage++;
            const pageInfo = await loadRooms(currentPrivatePage, 'private');
            hasMorePrivate = pageInfo.hasMore;

            document.getElementById('private-loading').style.display = 'none';
            if (hasMorePrivate) {
                this.style.display = 'block';
            }
        });

        // ===== MENU DROPDOWN LOGIC =====
        const menuButton = document.getElementById('menu-button');
        const menuDropdown = document.getElementById('menu-dropdown');
        const menuOverlay = document.getElementById('menu-overlay');
        const isPrivateCheckboxDropdown = document.getElementById('is-private-checkbox-dropdown');
        const passwordInputDropdown = document.getElementById('room-password-input-dropdown');
        const createRoomFormDropdown = document.getElementById('create-room-form-dropdown');

        if (menuButton) {
            menuButton.addEventListener('click', (e) => {
                console.log('Menu button clicked');
                e.stopPropagation();
                menuDropdown.classList.toggle('active');
                menuOverlay.classList.toggle('active');
            });
        }

        if (menuOverlay) {
            menuOverlay.addEventListener('click', () => {
                menuDropdown.classList.remove('active');
                menuOverlay.classList.remove('active');
            });
        }

        document.addEventListener('click', (e) => {
            if (menuDropdown && !e.target.closest('.header-menu-wrapper')) {
                menuDropdown.classList.remove('active');
                menuOverlay.classList.remove('active');
            }
        });

        if (isPrivateCheckboxDropdown && passwordInputDropdown) {
            isPrivateCheckboxDropdown.addEventListener('change', function () {
                if (this.checked) {
                    passwordInputDropdown.style.display = 'block';
                    passwordInputDropdown.required = true;
                } else {
                    passwordInputDropdown.style.display = 'none';
                    passwordInputDropdown.required = false;
                }
            });
        }

        if (createRoomFormDropdown) {
            createRoomFormDropdown.addEventListener('submit', async function (e) {
                e.preventDefault();

                const roomName = document.getElementById('new-room-name-dropdown').value.trim();
                const isPrivate = document.getElementById('is-private-checkbox-dropdown').checked;
                const password = document.getElementById('room-password-input-dropdown').value.trim();

                if (!roomName) {
                    alert('Введіть назву кімнати');
                    return;
                }

                if (isPrivate && !password) {
                    alert('Введіть пароль для приватної кімнати');
                    return;
                }

                try {
                    const body = {
                        name: roomName,
                        is_private: isPrivate
                    };
                    if (isPrivate) {
                        body.password = password;
                    }

                    const response = await fetch('/api/rooms/', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'X-CSRFToken': getCookie('csrftoken')
                        },
                        body: JSON.stringify(body)
                    });

                    if (response.ok) {
                        const data = await response.json();
                        console.log('Room created:', data);
                        window.location.href = `/room/${data.id}/`;
                    } else {
                        const data = await response.json();
                        alert('Помилка: ' + (data.detail || 'Не вдалося створити кімнату'));
                    }
                } catch (error) {
                    console.error('Помилка:', error);
                    alert('Помилка при створенні кімнати');
                }
            });
        }

        window.joinPrivateRoomByUUID_dropdown = async function () {
            const roomId = document.getElementById('room-id-input-dropdown').value.trim();
            const password = document.getElementById('join-password-input-dropdown').value.trim();

            if (!roomId || !password) {
                alert('Введіть UUID та пароль кімнати');
                return;
            }

            try {
                const response = await fetch(`/api/rooms/${roomId}/join/`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRFToken': getCookie('csrftoken')
                    },
                    body: JSON.stringify({ password: password })
                });

                if (response.ok) {
                    window.location.href = `/room/${roomId}/`;
                } else {
                    const data = await response.json();
                    alert(data.detail || 'Невірний пароль');
                    document.getElementById('join-password-input-dropdown').value = '';
                }
            } catch (error) {
                console.error('Помилка:', error);
                alert('Помилка при вході в кімнату');
            }
        };

        window.joinWithInviteLink_dropdown = async function () {
            const inviteInput = document.getElementById('invite-link-input-dropdown').value.trim();

            if (!inviteInput) {
                alert('Введіть посилання для приєднання');
                return;
            }

            let token = inviteInput;
            let roomId = document.getElementById('room-id-input-dropdown').value.trim();

            // Якщо вставили повне посилання, дістаємо параметри з нього
            if (inviteInput.includes('?')) {
                try {
                    const urlObj = new URL(inviteInput);
                    token = urlObj.searchParams.get('invite') || inviteInput;
                    roomId = urlObj.searchParams.get('room') || roomId;
                } catch (e) {
                    console.error("Не вдалося розпарсити URL:", e);
                }
            }

            if (!roomId) {
                alert('Не вдалося визначити UUID кімнати. Введіть його в полі вище або скористайтеся прямим переходом за посиланням.');
                return;
            }

            try {
                const response = await fetch(`/api/rooms/${roomId}/join-with-link/`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRFToken': getCookie('csrftoken')
                    },
                    body: JSON.stringify({ token: token })
                });

                if (response.ok) {
                    window.location.href = `/room/${roomId}/`;
                } else {
                    const data = await response.json();
                    alert(data.detail || 'Невірне посилання');
                    document.getElementById('invite-link-input-dropdown').value = '';
                }
            } catch (error) {
                console.error('Помилка:', error);
                alert('Помилка при приєднанні');
            }
        };

        // Password modal handlers
        window.openPasswordModal = function (roomId, roomName) {
            currentRoomId = roomId;
            document.getElementById('modal-room-name').textContent = 'Кімната: ' + roomName;
            document.getElementById('password-modal').classList.add('active');
            document.getElementById('modal-password-input').focus();
        };

        window.closePasswordModal = function () {
            document.getElementById('password-modal').classList.remove('active');
            document.getElementById('modal-password-input').value = '';
            currentRoomId = null;
        };

        window.joinPrivateRoom = async function () {
            const password = document.getElementById('modal-password-input').value.trim();
            if (!password) {
                alert('Будь ласка, введіть пароль');
                return;
            }

            try {
                const response = await fetch(`/api/rooms/${currentRoomId}/join/`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRFToken': getCookie('csrftoken')
                    },
                    body: JSON.stringify({ password: password })
                });

                if (response.ok) {
                    window.location.href = `/room/${currentRoomId}/`;
                } else {
                    const data = await response.json();
                    alert(data.detail || 'Невірний пароль');
                    document.getElementById('modal-password-input').value = '';
                }
            } catch (error) {
                console.error('Помилка:', error);
                alert('Помилка при вході в кімнату');
            }
        };

        // Modal background close
        document.getElementById('password-modal').addEventListener('click', (e) => {
            if (e.target.id === 'password-modal') {
                closePasswordModal();
            }
        });

        // Enter key in password input
        document.getElementById('modal-password-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                joinPrivateRoom();
            }
        });
    });
</script>

{% endblock %}
