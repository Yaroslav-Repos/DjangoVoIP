<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DjangoVoIP - Voice Chat</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #1e1e2e;
            color: #dbdbdb;
            line-height: 1.5;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Header */
        header {
            background: #2f3136;
            padding: 12px 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
            position: relative;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        header p {
            font-size: 14px;
        }

        header a {
            color: #5865f2;
            text-decoration: none;
            font-weight: 500;
            padding: 6px 12px;
            border-radius: 6px;
            transition: background 0.2s;
        }

        header a:hover {
            background: rgba(88, 101, 242, 0.2);
        }

        /* Buttons */
        button, .btn {
            background: #5865f2;
            color: white;
            border: none;
            padding: 10px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: background 0.2s;
        }

        button:hover, .btn:hover {
            background: #4752c4;
        }

        button:active, .btn:active {
            background: #3c45a5;
        }

        button.secondary {
            background: #40444b;
            color: #dbdbdb;
        }

        button.secondary:hover {
            background: #4e5058;
        }

        button.danger {
            background: #f04747;
        }

        button.danger:hover {
            background: #d83333;
        }

        /* Inputs */
        input[type="text"],
        input[type="password"],
        input[type="email"],
        textarea {
            background: #2f3136;
            border: 1px solid #202225;
            color: #dbdbdb;
            padding: 10px 12px;
            border-radius: 6px;
            font-size: 14px;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus,
        input[type="password"]:focus,
        input[type="email"]:focus,
        textarea:focus {
            outline: none;
            border-color: #5865f2;
            box-shadow: 0 0 0 2px rgba(88, 101, 242, 0.2);
        }

        /* Forms */
        form label {
            display: block;
            margin-bottom: 6px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            color: #b9bbbe;
        }

        form input,
        form textarea,
        form select {
            width: 100%;
            margin-bottom: 12px;
        }

        /* Modals */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: #36393f;
            border-radius: 12px;
            padding: 20px;
            max-width: 400px;
            width: 90%;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.5);
        }

        .modal-content h3 {
            margin-bottom: 16px;
            font-size: 18px;
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
            margin-top: 16px;
        }

        .modal-buttons button {
            flex: 1;
        }

        /* Alerts */
        .alert {
            background: #f04747;
            color: white;
            padding: 12px 16px;
            border-radius: 6px;
            margin-bottom: 16px;
            font-size: 14px;
        }

        .alert.success {
            background: #43b581;
        }

        h1, h2, h3, h4 {
            margin-bottom: 12px;
        }

        a {
            color: #5865f2;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        {% block extra_css %}{% endblock %}
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="header-left">
                {% if request.user.is_authenticated %}
                <div>👤 <strong>{{ request.user.username }}</strong></div>
                {% else %}
                <div>🔓 Не авторизовані</div>
                {% endif %}
                {% block header_menu %}{% endblock %}
            </div>
            <!-- Logout через POST request (CSRF protected) -->
            {% if request.user.is_authenticated %}
            <form method="post" action="{% url 'logout' %}" style="display: inline; margin: 0;">
                {% csrf_token %}
                <button type="submit" style="background: #f04747; border: none; color: white; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: 500; transition: background 0.2s;">Вийти</button>
            </form>
            {% endif %}
        </header>
        {% block content %}{% endblock %}
    </div>
</body>
</html>
